name: CC Project Pipeline

on:
  push:
    branches: [ "main", "dev", "feature/*" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: 🔨 Build CC Project
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cc-app
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Compile Project
      run: mvn clean compile

  test:
    name: 🧪 Test CC Project
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: cc-app
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Cache Dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

    - name: Run Unit Tests
      run: mvn -Dtest=!SeleniumTest test

    - name: Package JAR
      run: mvn -DskipTests package

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: cc-test-results
        path: cc-app/target/surefire-reports/
        retention-days: 5

    - name: Publish Test Results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: CC Test Results
        path: cc-app/target/surefire-reports/*.xml
        reporter: java-junit

  docker:
    name: 🐳 Build & Push CC Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Docker Login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/cc-project:latest ./cc-app

    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/cc-project:latest

  deploy:
    name: 🚀 Deploy CC Project
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Deployment Info
      run: echo "Application deployed using cloud platform"

    - name: Live URL
      run: echo "Update with your Render URL after deployment"